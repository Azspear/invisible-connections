<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox - Invisible Connections</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html, body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      height: 100%;
      overflow: hidden;
    }
    
    .inbox-container {
      display: flex;
      height: 100vh;
    }
    
    /* Sidebar */
    .sidebar {
      width: 350px;
      background: #2a2a2a;
      border-right: 1px solid #3a3a3a;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar-header {
      padding: 20px;
      background: #1f1f1f;
      border-bottom: 1px solid #3a3a3a;
    }

    .nav-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .back-btn {
      font-size: 13px; color: #808080; text-decoration: none;
      transition: color 0.2s;
    }
    .back-btn:hover { color: #e0e0e0; }
    .logout-btn {
      font-size: 13px; color: #808080; background: none; border: none;
      cursor: pointer; transition: color 0.2s;
    }
    .logout-btn:hover { color: #e74c3c; }
    
    .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
    }
    
    .search-bar {
      position: relative;
    }
    
    .search-input {
      width: 100%;
      padding: 10px 15px;
      background: #3a3a3a;
      border: 1px solid #4a4a4a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .search-input::placeholder {
      color: #808080;
    }
    
    .search-result {
      margin-top: 10px;
      padding: 12px;
      background: #3a3a3a;
      border-radius: 8px;
      display: none;
    }
    
    .search-result.show {
      display: block;
    }
    
    .search-result .username {
      font-weight: 600;
      color: #667eea;
      margin-bottom: 5px;
    }
    
    .search-result .bio {
      font-size: 13px;
      color: #b0b0b0;
      margin-bottom: 8px;
    }
    
    .search-result .btn-message {
      padding: 6px 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    
    .conversations-list {
      flex: 1;
      overflow-y: auto;
    }
    
    .conversation-item {
      padding: 15px 20px;
      border-bottom: 1px solid #3a3a3a;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    
    .conversation-item:hover {
      background: #333333;
    }
    
    .conversation-item.active {
      background: #3a3a3a;
      border-left: 3px solid #667eea;
    }
    
    .conversation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    
    .conversation-username {
      font-weight: 600;
      color: #f0f0f0;
      font-size: 15px;
    }
    
    .conversation-time {
      font-size: 12px;
      color: #808080;
    }
    
    .conversation-preview {
      font-size: 13px;
      color: #b0b0b0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .unread-badge {
      position: absolute;
      top: 15px;
      right: 20px;
      background: #667eea;
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
    }
    
    /* Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #1e1e1e;
    }
    
    .chat-header {
      padding: 20px;
      background: #2a2a2a;
      border-bottom: 1px solid #3a3a3a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .chat-user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .chat-username {
      font-size: 18px;
      font-weight: 600;
      color: #f0f0f0;
    }
    
    .compatibility-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
    }
    
    .chat-actions {
      display: flex;
      gap: 10px;
    }
    
    .btn-icon {
      padding: 8px 12px;
      background: #3a3a3a;
      border: none;
      border-radius: 6px;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 14px;
    }
    
    .btn-icon:hover {
      background: #4a4a4a;
    }
    
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      position: relative;
    }
    
    .message.sent {
      align-self: flex-end;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .message.received {
      align-self: flex-start;
      background: #2a2a2a;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    
    .message-time {
      font-size: 11px;
      margin-top: 5px;
      opacity: 0.7;
    }
    
    .message-input-area {
      padding: 20px;
      background: #2a2a2a;
      border-top: 1px solid #3a3a3a;
      display: flex;
      gap: 10px;
    }
    
    .message-input {
      flex: 1;
      padding: 12px 16px;
      background: #1f1f1f;
      border: 1px solid #3a3a3a;
      border-radius: 24px;
      color: #e0e0e0;
      font-size: 14px;
      resize: none;
      max-height: 120px;
    }
    
    .message-input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .btn-send {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }
    
    .btn-send:hover {
      transform: scale(1.05);
    }
    
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #808080;
      text-align: center;
      padding: 40px;
    }
    
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    .empty-state-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #b0b0b0;
    }
    
    .empty-state-text {
      font-size: 14px;
      line-height: 1.6;
    }
    
    .typing-indicator {
      align-self: flex-start;
      background: #2a2a2a;
      padding: 12px 16px;
      border-radius: 12px;
      display: none;
    }
    
    .typing-indicator.show {
      display: block;
    }
    
    .typing-dots {
      display: flex;
      gap: 4px;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    
    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    
    @keyframes typing {
      0%, 60%, 100% {
        transform: translateY(0);
      }
      30% {
        transform: translateY(-10px);
      }
    }
    
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: absolute;
        z-index: 10;
        display: none;
      }
      
      .sidebar.show {
        display: flex;
      }
      
      .chat-area {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="inbox-container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="nav-bar">
        <a href="matches.html" class="back-btn">← Matches</a>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
      <div class="logo">Invisible Connections</div>
      <div class="search-bar">
        <input 
          type="text" 
          id="searchInput" 
          class="search-input" 
          placeholder="Search user by 4-digit ID (e.g., 1234)"
          maxlength="4"
        />
        <div id="searchResult" class="search-result"></div>
      </div>
    </div>
    
    <div class="conversations-list" id="conversationsList">
      <!-- Conversations will be loaded here -->
    </div>
  </div>
  
  <!-- Chat Area -->
  <div class="chat-area">
    <div id="emptyState" class="empty-state">
      <div class="empty-state-icon">💬</div>
      <div class="empty-state-title">Welcome to Your Inbox</div>
      <div class="empty-state-text">
        Select a conversation or search for a user by their 4-digit ID to start chatting
      </div>
    </div>
    
    <div id="chatContainer" style="display: none; flex-direction: column; height: 100%;">
      <div class="chat-header">
        <div class="chat-user-info">
          <div>
            <div class="chat-username" id="chatUsername"></div>
          </div>
          <div class="compatibility-badge" id="compatibilityBadge"></div>
        </div>
        <div class="chat-actions">
          <button class="btn-icon" onclick="viewProfile()">👤 Profile</button>
          <button class="btn-icon" onclick="blockUser()" style="color: #e74c3c;">🚫 Block</button>
        </div>
      </div>
      
      <div class="messages-container" id="messagesContainer">
        <!-- Messages will be loaded here -->
      </div>
      
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
      
      <div class="message-input-area">
        <textarea 
          id="messageInput" 
          class="message-input" 
          placeholder="Type your message..."
          rows="1"
        ></textarea>
        <button class="btn-send" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script src="js/api.js"></script>

<script>

let socket;
let currentConversationId = null;
let currentUserId = null;
let currentUsername = null;

/* ================= INIT ================= */

async function init() {
  const isAuth = await checkAuth();
  if (!isAuth) {
    window.location.href = "landing.html";
    return;
  }

  const user = JSON.parse(localStorage.getItem("user"));
  currentUserId = user.id;
  currentUsername = user.username;

  initializeSocket();
  await loadConversations();
  setupMessageInput();
}

/* ================= SOCKET ================= */

function initializeSocket() {
  socket = io(SOCKET_URL, {
    transports: ["websocket"],
  });

  socket.on("connect", () => {
    socket.emit("authenticate", {
      userId: currentUserId,
      username: currentUsername,
    });
  });

  socket.on("new-message", (data) => {
    if (data.conversationId == currentConversationId) {
      appendMessage(data);
      scrollToBottom();
    }
    loadConversations();
  });
}

/* ================= LOAD CONNECTIONS ================= */

async function loadConversations() {
  const data = await apiCall(API_ENDPOINTS.inbox);
  const list = document.getElementById("conversationsList");

  if (!data.conversations.length) {
    list.innerHTML =
      '<div style="padding:20px;color:#808080">No connections yet</div>';
    return;
  }

  list.innerHTML = data.conversations
    .map(
      (conv) => `
    <div class="conversation-item"
         onclick="openConversation('${conv.conversation_id}')">
      <div class="conversation-header">
        <div class="conversation-username">${conv.other_username}</div>
      </div>
      <div class="conversation-preview">
        ${conv.last_message || "Start the conversation 👋"}
      </div>
    </div>
  `
    )
    .join("");

  // Auto open first conversation
  if (!currentConversationId) {
    openConversation(data.conversations[0].conversation_id);
  }
}

/* ================= OPEN CHAT ================= */

async function openConversation(conversationId) {
  currentConversationId = conversationId;

  document.getElementById("emptyState").style.display = "none";
  document.getElementById("chatContainer").style.display = "flex";

  socket.emit("join-conversation", conversationId);

  const info = await apiCall(
    API_ENDPOINTS.conversationInfo(conversationId)
  );

  document.getElementById("chatUsername").textContent =
    info.other_username;

  document.getElementById("compatibilityBadge").textContent =
    info.compatibility_score + "% Match";

  await loadMessages(conversationId);
}

/* ================= LOAD MESSAGES ================= */

async function loadMessages(conversationId) {
  const data = await apiCall(
    API_ENDPOINTS.conversationMessages(conversationId)
  );

  const container = document.getElementById("messagesContainer");

  container.innerHTML = data.messages
    .map(
      (msg) => `
    <div class="message ${
      msg.sender_id == currentUserId ? "sent" : "received"
    }">
      <div>${msg.content}</div>
      <div class="message-time">
        ${new Date(msg.sent_at).toLocaleTimeString()}
      </div>
    </div>
  `
    )
    .join("");

  scrollToBottom();
}

/* ================= SEND MESSAGE ================= */

function sendMessage() {
  const input = document.getElementById("messageInput");
  const content = input.value.trim();

  if (!content || !currentConversationId) return;

  socket.emit("send-message", {
    conversationId: currentConversationId,
    content,
  });

  input.value = "";
}

/* ================= UI HELPERS ================= */

function appendMessage(msg) {
  const container = document.getElementById("messagesContainer");

  const div = document.createElement("div");
  div.className =
    "message " +
    (msg.senderId == currentUserId ? "sent" : "received");

  div.innerHTML = `
    <div>${msg.content}</div>
    <div class="message-time">
      ${new Date(msg.sentAt).toLocaleTimeString()}
    </div>
  `;

  container.appendChild(div);
}

function scrollToBottom() {
  const container = document.getElementById("messagesContainer");
  container.scrollTop = container.scrollHeight;
}

function setupMessageInput() {
  const input = document.getElementById("messageInput");

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}

window.addEventListener("load", init);

</script>
</body>
</html>
