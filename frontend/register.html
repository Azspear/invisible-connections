<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Invisible Connections</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #17171d; --border: rgba(255,255,255,0.08);
      --accent: #667eea; --accent2: #764ba2; --text: #e8e8f0; --muted: #6b6b80;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 40px 20px;
    }
    body::before {
      content: ''; position: fixed; top: -300px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(102,126,234,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .container { width: 100%; max-width: 420px; position: relative; z-index: 1; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none;
      margin-bottom: 32px; transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px;
    }

    .logo {
      font-family: 'DM Serif Display', serif; font-size: 20px;
      background: linear-gradient(135deg, #667eea, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }

    h1 { font-family: 'DM Serif Display', serif; font-size: 30px; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #b0b0c0; margin-bottom: 8px; }

    input {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); background: rgba(102,126,234,0.06); }
    input::placeholder { color: var(--muted); }

    .btn-submit {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(102,126,234,0.4); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error {
      background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3);
      color: #ff6b6b; padding: 12px 16px; border-radius: 8px;
      font-size: 14px; margin-bottom: 20px; display: none;
    }
    .error.show { display: block; }

    .success-card {
      text-align: center; padding: 20px 0; display: none;
    }
    .success-card.show { display: block; }

    .your-id {
      font-family: 'DM Serif Display', serif; font-size: 72px; font-weight: 400;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 8px; margin: 16px 0 8px;
    }
    .id-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

    .btn-continue {
      display: block; width: 100%; padding: 14px; text-align: center;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: all 0.2s;
    }
    .btn-continue:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(102,126,234,0.4); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 13px; color: var(--muted); }

    .sign-in-link { text-align: center; font-size: 14px; color: var(--muted); }
    .sign-in-link a { color: var(--accent); text-decoration: none; }
    .sign-in-link a:hover { text-decoration: underline; }

    .strength-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.3s, background 0.3s; }
  </style>
</head>
<body>
<div class="container">
  <a href="landing.html" class="back-link">← Back to home</a>

  <div class="card">
    <div class="logo">Invisible Connections</div>
    <h1>Create account</h1>
    <p class="subtitle">You'll get a random 4-digit ID — no name needed.</p>

    <div class="error" id="errorMsg"></div>

    <!-- Registration Form -->
    <div id="registerForm">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password">
      </div>
      <button class="btn-submit" id="submitBtn" onclick="register()">Create My Account</button>

      <div class="divider"><span>Already have an account?</span></div>
      <div class="sign-in-link"><a href="login.html">Sign in instead →</a></div>
    </div>

    <!-- Success State -->
    <div class="success-card" id="successCard">
      <p style="color: var(--muted); font-size: 14px;">Your anonymous ID is</p>
      <div class="your-id" id="yourId">----</div>
      <p class="id-subtitle">Write it down — this is how people find you! 📝</p>
      <a href="profile.html" class="btn-continue">Set Up My Profile →</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
// Password strength
document.getElementById('password').addEventListener('input', function() {
  const val = this.value;
  const fill = document.getElementById('strengthFill');
  let strength = 0;
  if (val.length >= 6) strength++;
  if (val.length >= 10) strength++;
  if (/[A-Z]/.test(val)) strength++;
  if (/[0-9]/.test(val)) strength++;
  const pct = (strength / 4) * 100;
  const colors = ['#e74c3c', '#f39c12', '#2ecc71', '#27ae60'];
  fill.style.width = pct + '%';
  fill.style.background = colors[strength - 1] || '#e74c3c';
});

async function register() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.classList.remove('show');

  if (!email || !password) {
    showError('Please fill in all fields.');
    return;
  }
  if (password.length < 6) {
    showError('Password must be at least 6 characters.');
    return;
  }
  if (password !== confirm) {
    showError('Passwords do not match.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const data = await apiCall(API_ENDPOINTS.register, {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });

    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));

    // Show success
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('yourId').textContent = data.user.username;
    document.getElementById('successCard').classList.add('show');

  } catch (error) {
    showError(error.message || 'Registration failed. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Create My Account';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

// Allow Enter key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') register();
});

// Redirect if already logged in
checkAuth().then(isAuth => {
  if (isAuth) window.location.href = 'matches.html';
});
</script>
</body>
</html>
